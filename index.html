<title>
   Lorcano

<link href="styles/styles.css" rel="stylesheet"/>
<link href="styles/rang.css" rel="stylesheet"/>

<body>
<div class="show-filters">
<a href="deck">
    deck
   </a>
<a href="counter">
    counter
   </a>
<button class="filtresBtn">
    Amaga els filtres
   </button>
</div>
<br/>
<br/>
<!-- lang -->
<div id="idioma">
<button class="idioma activeIdioma" id="toggleIdiomaEN">
    EN
   </button>
<button class="idioma" id="toggleIdiomaFR">
    FR
   </button>
</div>
<div id="filtres-global">
<!-- Filtre per endreçar -->
<div id="sort-per">
<label for="sort-select">
     Endreça per:
    </label>
<br/>
<select id="sort-select">
<option value="ink-cost">
      Cost de tinta
     </option>
<option value="name">
      Nom
     </option>
<option value="color">
      Color
     </option>
<option value="strength">
      Poder
     </option>
<option value="willpower">
      Vida
     </option>
<option value="lore">
      Lore
     </option>
<option value="card-number">
      Número de carta
     </option>
</select>
<!-- Invertir ordre -->
<button id="invert-order-button">
     Invertir ordre
    </button>
<!-- Eliminar filtres -->
<button id="clear-all">
     Eliminar filtres
    </button>
</div>
<br/>
<div id="botonsFiltres">
<button class="filtres-colors-Btn mostrar-opcions">
     Mostra els filtres per colors
    </button>
<button class="filtres-tipus-Btn mostrar-opcions">
     Mostra els filtres per tipus
    </button>
<button class="filtres-set-Btn mostrar-opcions">
     Mostra els filtres per set
    </button>
<button class="filtres-rarity-Btn mostrar-opcions">
     Mostra els filtres per raresa
    </button>
<button class="show-range-Btn mostrar-opcions">
     Mostra el selector de cost
    </button>
<button class="show-search-btn">
     Amaga els cercadors
    </button>
</div>
<div id="filtres">
<!-- Filtres per colors -->
<div id="color-filters"></div>
<!-- filtres per tipus de carta -->
<div id="card-type"></div>
<!-- filtres per nom de colecció -->
<div id="set-name-filter"></div>
<!-- filtres per raresa -->
<div id="rarity-filter"></div>
<!-- Rang per cost -->
<div class="rang">
<div class="ink-content">
<div class="cost-left">
<label for="range-min">
        Min
       </label>
<p id="min-value">
        1
       </p>
</div>
<div>
<label for="range-max">
        Max
       </label>
<p id="max-value">
        10
       </p>
</div>
</div>
<div class="range-slider">
<div class="range-fill">
</div>
<input class="min-ink" id="range-min" max="10" min="1" step="1" type="range" value="1"/>
<input class="max-ink" id="range-max" max="10" min="1" step="1" type="range" value="10"/>
</div>
</div>
<!-- Camp de búsqueda per Name-->
<div id="searchers">
<input id="search-input" placeholder="Buscar per nom..." type="text"/>
<input id="search-input-att" placeholder="Buscar per atributs..." type="text"/>
<input id="search-input-eff" placeholder="Buscar per efectes..." type="text"/>
<input id="search-input-global" placeholder="Buscar per qualsevol cosa" type="text"/>
<br/>
<input id="search-input-illustrator" placeholder="Buscar per ilustrador" type="text"/>
<!-- <input type="text" id="search-input-number" placeholder="Número de carta"> -->
<!-- esborrar búsquedas -->
<!-- <br> -->
<!-- <button class="clear-search">Esborra búsquedes</button> -->
</div>
<br/>
<div>
<!-- Dropdown per a filtres inkable -->
<label for="inkable-select">
      Tintejable?
     </label>
<select id="inkable-select">
<option value="any">
       -
      </option>
<option value="true">
       Sí
      </option>
<option value="false">
       No
      </option>
</select>
<!-- Dropdown per a filtres Enchanted -->
<label for="enchanted-select">
      Enchanted?
     </label>
<select id="enchanted-select">
<option value="any">
       -
      </option>
<option value="true">
       Sí
      </option>
<option selected="" value="false">
       No
      </option>
</select>
</div>
</div>
</div>
<!-- placeholder -->
<div id="placeholder">
<br/>
   S'estan carregant les cartes, un moment siusplau...
   <img alt="loading" id="loading-placeholder" src="resources/load.gif"/>
</div>
<!-- cartes -->
<div class="display-cards">
<ul id="file-list">
</ul>
</div>
<!-- carrga més -->
<button id="load-more-button">
   Carrega més cartes
  </button>
<button id="load-all-button">
   Carrega totes les cartes
  </button>
<!-- Modal -->
<div class="modal" id="modal" style="display: none;">
<span class="close">
    ×
   </span>
<button class="modalbtn" id="prev-btn">
<img alt="&lt;" src="resources/la2.png"/>
</button>
<img class="modal-content" id="modal-img"/>
<div id="modal-name">
</div>
<div id="modal-type">
</div>
<button class="modalbtn" id="next-btn">
<img alt="&gt;" src="resources/ra2.png"/>
</button>
</div>
<!-- scripts -->
<script src="scripts/modal.js" type="module">
</script>
<script src="scripts/mostrar-filtres.js" type="module">
</script>
<script src="scripts/api.js" type="module">
</script>
<script src="scripts/filters.js" type="module">
</script>
<script src="scripts/sorting.js" type="module">
</script>
<script src="scripts/search.js" type="module">
</script>
<script src="scripts/display.js" type="module">
</script>
<script src="scripts/eventHandlers.js" type="module">
</script>
<script src="scripts/filterBuilder.js" type="module"></script><script src="scripts/main.js" type="module">
</script>

<div class="container">
<div id="footer">

   </div>
